<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body{font-family:Arial;margin:20px;}
        input,select,button{padding:6px;margin:5px;}
        table{border-collapse:collapse;width:100%;margin-top:15px;}
        th,td{border:1px solid #000;padding:8px;text-align:left;}
        #error{color:red;}
        .pagination button{margin:2px;}
    </style>
</head>
<body>

<h2>Student Management System</h2>

<form id="studentForm">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    <select id="grade">
        <option value="">Select Grade</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
    </select>
    <button type="submit">Save</button>
</form>

<p id="error"></p>

<input type="text" id="search" placeholder="Search by Name">
<select id="filterGrade">
    <option value="">All Grades</option>
    <option>A</option>
    <option>B</option>
    <option>C</option>
</select>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentTable"></tbody>
</table>

<div class="pagination"></div>

<script>
$(function(){

const API="http://localhost:3000/students";
let editId=null;
let currentPage=1;
const perPage=5;
let allStudents=[];

function loadStudents(){
    $.get(API,function(data){
        allStudents=data;
        displayStudents();
    });
}

function displayStudents(){
    let searchVal=$("#search").val().toLowerCase();
    let gradeVal=$("#filterGrade").val();

    let filtered=allStudents.filter(s=>{
        let matchName=s.name.toLowerCase().includes(searchVal);
        let matchGrade=gradeVal==="" || s.grade===gradeVal;
        return matchName && matchGrade;
    });

    let totalPages=Math.ceil(filtered.length/perPage);
    if(currentPage>totalPages) currentPage=1;

    let start=(currentPage-1)*perPage;
    let paginated=filtered.slice(start,start+perPage);

    let rows="";
    $.each(paginated,function(i,s){
        rows+=`<tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.age}</td>
            <td>${s.grade}</td>
            <td>
                <button class="edit" data-id="${s.id}">Edit</button>
                <button class="delete" data-id="${s.id}">Delete</button>
            </td>
        </tr>`;
    });
    $("#studentTable").html(rows);

    let pageBtns="";
    for(let i=1;i<=totalPages;i++){
        pageBtns+=`<button class="pageBtn" data-page="${i}">${i}</button>`;
    }
    $(".pagination").html(pageBtns);
}

$("#studentForm").submit(function(e){
    e.preventDefault();

    let name=$("#name").val().trim();
    let age=$("#age").val().trim();
    let grade=$("#grade").val();

    if(name===""||age===""||grade===""){
        $("#error").text("All fields required");
        return;
    }
    $("#error").text("");

    let student={name,age:Number(age),grade};

    if(editId){
        $.ajax({
            url:API+"/"+editId,
            method:"PUT",
            contentType:"application/json",
            data:JSON.stringify(student),
            success:function(){
                editId=null;
                $("#studentForm")[0].reset();
                loadStudents();
            }
        });
    }else{
        $.ajax({
            url:"http://localhost:3000/students",
            method:"POST",
            contentType:"application/json",
            data:JSON.stringify(student),
            success:function(){
                $("#studentForm")[0].reset();
                loadStudents();
            }
        });
    }
});

$("#studentTable").on("click",".edit",function(){
    let id=$(this).data("id");
    $.get(API+"/"+id,function(s){
        $("#name").val(s.name);
        $("#age").val(s.age);
        $("#grade").val(s.grade);
        editId=id;
    });
});

$("#studentTable").on("click",".delete",function(){
    let id=$(this).data("id");
    if(confirm("Delete this student?")){
        $.ajax({
            url:API+"/"+id,
            method:"DELETE",
            success:function(){
                loadStudents();
            }
        });
    }
});

$("#search,#filterGrade").on("keyup change",function(){
    currentPage=1;
    displayStudents();
});

$(".pagination").on("click",".pageBtn",function(){
    currentPage=$(this).data("page");
    displayStudents();
});

loadStudents();

});
</script>

</body>
</html>
